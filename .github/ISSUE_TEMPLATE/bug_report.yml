name: Bug report
description: Report something broken or confusing in one of the mods.
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: mod
    attributes:
      label: Mod
      options:
        - NARwhal Together
        - Mushroom the Yorkie
        - Repo/build tooling
        - Not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the behavior you saw.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: Describe what should have happened instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start Minecraft with ...
        2. Use ...
        3. See ...
    validations:
      required: true
  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: "1.21.11"
    validations:
      required: true
  - type: input
    id: mod-version
    attributes:
      label: Mod version or jar name
      placeholder: "narwhal-together-0.1.0.jar"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant latest.log lines or attach screenshots if helpful.
      render: text

name: Publish to Modrinth

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: Modrinth release channel
        required: true
        default: alpha
        type: choice
        options:
          - alpha
          - beta
          - release

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: modrinth
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and publish
        run: ./gradlew build modrinth --no-daemon
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
          MODRINTH_VERSION_TYPE: ${{ inputs.version_type }}

name: Publish to Modrinth

on:
  workflow_dispatch:
    inputs:
      mod:
        description: Mod to publish
        required: true
        default: mushroom-the-yorkie
        type: choice
        options:
          - mushroom-the-yorkie
          - narwhal-together
          - cops-and-robbers
      version_type:
        description: Modrinth release channel
        required: true
        default: alpha
        type: choice
        options:
          - alpha
          - beta
          - release

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: modrinth
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and publish
        run: ./gradlew ":${{ inputs.mod }}:build" ":${{ inputs.mod }}:modrinth" --no-daemon
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
          MUSHROOM_MODRINTH_PROJECT_ID: ${{ vars.MUSHROOM_MODRINTH_PROJECT_ID }}
          COPS_ROBBERS_MODRINTH_PROJECT_ID: ${{ vars.COPS_ROBBERS_MODRINTH_PROJECT_ID }}
          MODRINTH_VERSION_TYPE: ${{ inputs.version_type }}

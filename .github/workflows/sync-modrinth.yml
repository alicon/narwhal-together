name: Sync Modrinth Metadata

on:
  workflow_dispatch:
    inputs:
      mod:
        description: Mod metadata to sync
        required: true
        default: mushroom-the-yorkie
        type: choice
        options:
          - mushroom-the-yorkie
          - narwhal-together
          - cops-and-robbers

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: modrinth
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Synchronize project metadata and artwork
        run: ./scripts/sync-modrinth-metadata.sh
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
          MUSHROOM_MODRINTH_PROJECT_ID: ${{ vars.MUSHROOM_MODRINTH_PROJECT_ID }}
          COPS_ROBBERS_MODRINTH_PROJECT_ID: ${{ vars.COPS_ROBBERS_MODRINTH_PROJECT_ID }}
          MODRINTH_MOD: ${{ inputs.mod }}

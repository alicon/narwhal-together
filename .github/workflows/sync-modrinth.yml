name: Sync Modrinth Metadata

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: modrinth
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Synchronize project metadata and artwork
        run: ./scripts/sync-modrinth-metadata.sh
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
